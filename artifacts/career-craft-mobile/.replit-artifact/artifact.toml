kind = "mobile"
previewPath = "/mobile/"
title = "Career Craft Mobile"
version = "1.0.0"
id = "artifacts/career-craft-mobile"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 3000

[services.development]
run = "/home/runner/workspace/artifacts/career-craft-mobile/start-dev.sh"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-craft-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/career-craft-mobile", "run", "serve" ]

[services.env]
PORT = "3000"
BASE_PATH = "/mobile/"
