services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: careercraft
      POSTGRES_USER: careercraft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careercraft"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Bind only to localhost — nginx on the host proxies external traffic here
      - "127.0.0.1:5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://careercraft:${POSTGRES_PASSWORD}@db:5432/careercraft
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://hiddentechdaily.com,https://www.hiddentechdaily.com}
      APP_URL: ${APP_URL:-https://hiddentechdaily.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      STRIPE_LIFETIME_PRICE_ID: ${STRIPE_LIFETIME_PRICE_ID:-}
      STARTER_MONTHLY_AI_LIMIT: ${STARTER_MONTHLY_AI_LIMIT:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}

volumes:
  postgres_data:
