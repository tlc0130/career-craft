services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Bind only to localhost — nginx on the host proxies external traffic here
      - "127.0.0.1:5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://craft.hiddentechdaily.com}
      APP_URL: ${APP_URL:-https://craft.hiddentechdaily.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      STRIPE_LIFETIME_PRICE_ID: ${STRIPE_LIFETIME_PRICE_ID:-}
      STARTER_MONTHLY_AI_LIMIT: ${STARTER_MONTHLY_AI_LIMIT:-5}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Supabase's connection pooler uses an intermediate CA not in Node's default
      # bundle. Disabling cert verification here lets pg connect via SSL (required
      # for Supabase tenant routing) without rejecting the pooler's certificate.
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
