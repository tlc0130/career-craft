# /etc/nginx/sites-available/hiddentechdaily.com
# Symlink to /etc/nginx/sites-enabled/ then run: sudo nginx -t && sudo systemctl reload nginx

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hiddentechdaily.com www.hiddentechdaily.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hiddentechdaily.com www.hiddentechdaily.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/hiddentechdaily.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hiddentechdaily.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Serve the built React SPA
    root  /var/www/career-craft;
    index index.html;

    # SPA routing — unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the Docker API container
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE (Server-Sent Events) streaming
        proxy_set_header   Connection      '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively (Vite adds content hashes to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
