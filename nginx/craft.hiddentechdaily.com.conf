# /etc/nginx/sites-available/craft.hiddentechdaily.com
# Symlink: sudo ln -sf /etc/nginx/sites-available/craft.hiddentechdaily.com \
#                      /etc/nginx/sites-enabled/craft.hiddentechdaily.com
# Then:    sudo nginx -t && sudo systemctl reload nginx

# ──────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name craft.hiddentechdaily.com;

    # Let's Encrypt ACME challenge (used by certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────
# HTTPS — main application
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name craft.hiddentechdaily.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/craft.hiddentechdaily.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/craft.hiddentechdaily.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── React SPA static files ────────────────────────────────
    root  /var/www/career-craft;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → Docker container ─────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) streaming — must NOT buffer
        proxy_set_header   Connection      '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;

        # Stripe webhook delivers raw JSON bodies up to ~65 KB
        client_max_body_size 1m;
    }

    # ── Security headers (Stripe-compatible) ─────────────────
    # HSTS — force HTTPS for 1 year, including subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Block MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Limit referrer information to origin only on cross-site requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

    # Content-Security-Policy — whitelist Stripe's required domains
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.stripe.com https://openrouter.ai; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com;" always;

    # ── Static asset caching ──────────────────────────────────
    # Vite appends content hashes to filenames — safe to cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Gzip ─────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css text/javascript application/javascript
                    application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Rate limit — enforce nginx-level cap on top of app limits ──
    # Uncomment after adding `limit_req_zone` to /etc/nginx/nginx.conf:
    # limit_req zone=api burst=20 nodelay;
}
